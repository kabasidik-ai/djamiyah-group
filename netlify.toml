[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SITE_URL,NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,SUPABASE_SERVICE_ROLE_KEY,CHAPCHAP_BASE_URL,CHAPCHAP_API_KEY_TEST,CHAPCHAP_API_KEY_PRODUCTION,CHAPCHAP_HMAC_SECRET,CHAPCHAP_NOTIFY_URL,CHAPCHAP_RETURN_URL"
  SECRETS_SCAN_ENABLED = "false"